name: Deploy Serverless Todo Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0

# Required for OIDC token issuance
permissions:
  id-token: write   # request the JWT from GitHub's OIDC provider
  contents: read    # checkout the repo

jobs:
  # ─── Lint & Validate ──────────────────────────────────────────────────────────
  validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install flake8 boto3

      - name: Lint Lambda functions
        run: flake8 lambdas/ --max-line-length=120 --ignore=E501

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template
        run: sam validate --lint

  # ─── Build & Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache SAM build artifacts
        uses: actions/cache@v4
        with:
          path: .aws-sam
          key: sam-${{ runner.os }}-${{ hashFiles('template.yaml', 'lambdas/**') }}

      - name: SAM Build
        run: sam build --parallel --cached

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name serverless-todo-app \
            --query "Stacks[0].Outputs" \
            --output table
